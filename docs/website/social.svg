<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141312"/>
      <stop offset="100%" stop-color="#1a1917"/>
    </linearGradient>
    <linearGradient id="kite-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d8a9c"/>
      <stop offset="100%" stop-color="#196774"/>
    </linearGradient>
    <linearGradient id="kite-hi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#23a0b5"/>
      <stop offset="100%" stop-color="#1d8a9c"/>
    </linearGradient>
    <linearGradient id="tail" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0941F"/>
      <stop offset="100%" stop-color="#EF6024"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#90A19D" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Kite icon -->
  <g transform="translate(440, 160)">
    <!-- Body -->
    <path d="M50 0 L100 55 L50 140 L0 55 Z" fill="url(#kite-body)"/>
    <!-- Highlight -->
    <path d="M50 0 L100 55 L50 55 Z" fill="url(#kite-hi)"/>
    <!-- Structural lines -->
    <line x1="0" y1="55" x2="100" y2="55" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    <line x1="50" y1="0" x2="50" y2="140" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    <!-- Tail -->
    <path d="M50 140 Q60 155 50 168 Q40 181 50 194" stroke="url(#tail)" fill="none" stroke-width="3" stroke-linecap="round"/>
    <path d="M43 155 L57 155" stroke="#F0941F" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M44 181 L56 181" stroke="#EF6024" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- kite text -->
  <text x="580" y="310" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="700" font-size="96" fill="#f5f0e8" letter-spacing="3">kite</text>

  <!-- Tagline -->
  <text x="582" y="365" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="400" font-size="22" fill="#90A19D" letter-spacing="1">Kernel Interactive Terminal Explorer</text>

  <!-- Subtitle -->
  <text x="582" y="410" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="400" font-size="17" fill="#5e5a55">Cross-platform TUI system monitor · Written in Rust</text>

  <!-- Decorative sparkline at bottom -->
  <path d="M100 560 L180 555 L260 548 L340 552 L420 540 L500 545 L580 530 L660 535 L740 520 L820 525 L900 510 L980 505 L1060 498 L1140 500 L1180 495" stroke="#196774" fill="none" stroke-width="1.5" opacity="0.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 560 L180 555 L260 548 L340 552 L420 540 L500 545 L580 530 L660 535 L740 520 L820 525 L900 510 L980 505 L1060 498 L1140 500 L1180 495" stroke="#F0941F" fill="none" stroke-width="1.5" opacity="0.08" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 6"/>
</svg>
