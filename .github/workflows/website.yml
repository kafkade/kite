name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "docs/website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0993d1f0d7a4cb4e60e7e8fa3a7f4d4eb8d56f # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/website --project-name=kite
