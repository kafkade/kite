name: Bug Report
description: Report a bug in Kite
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below to help us investigate.
  - type: input
    id: version
    attributes:
      label: Kite version
      description: Run `kite --version` to find this
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      description: Which terminal are you using?
      placeholder: "e.g., Alacritty, iTerm2, Windows Terminal, kitty"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you observe?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run `kite`
        2. Press '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs or error messages
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help
