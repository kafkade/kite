name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.
  - type: textarea
    id: problem
    attributes:
      label: Is this related to a problem?
      description: A clear description of the problem this would solve
      placeholder: "I'm frustrated when..."
  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to happen
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives you've considered
  - type: dropdown
    id: phase
    attributes:
      label: Which phase does this relate to?
      description: See PLAN.md for phase details
      options:
        - "Phase 1: Core Metrics"
        - "Phase 2: Hardware & Theming"
        - "Phase 3: Containers & Alerts"
        - "Phase 4: Remote & Export"
        - "Phase 5: Polish & Distribution"
        - "Not sure"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, mockups, or screenshots
